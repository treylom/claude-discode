name: Setup failure
description: SETUP-BEGINNER.md 따라 설치 중 실패
title: "[setup] "
labels: ["setup", "user-report"]
body:
  - type: textarea
    id: step
    attributes:
      label: 어느 단계에서 실패했나요?
      description: 0~5 단계 중 어디서? (예 - "3단계 MCP 설치 중")
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: 셋업 로그 (~/.claude-discode-setup.log 내용)
      description: |
        아래 명령으로 로그를 복사한 후 붙여넣기:
        ```bash
        cat ~/.claude-discode-setup.log
        ```
        (로그는 자동으로 user path 가 REDACTED 처리됩니다.)
      render: shell
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 운영체제
      placeholder: "macOS 14.5 / Ubuntu 22.04 / WSL Ubuntu 20.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: node --version
    validations:
      required: true
  - type: input
    id: tier
    attributes:
      label: 어떤 Tier 까지 시도하셨나요?
      placeholder: "Tier 4 OK / Tier 3 OK / Tier 2 SKIP / Tier 1 FAIL"
  - type: checkboxes
    id: tried
    attributes:
      label: 시도한 troubleshooting
      options:
        - label: SETUP-BEGINNER.md 의 "❓ 실패 시" 박스 확인
        - label: 터미널 재시작 후 재시도
        - label: GitHub Discussions Feedback 검색
