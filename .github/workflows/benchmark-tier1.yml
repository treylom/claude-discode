name: benchmark-tier1
# Round 3 CC2 outcome — Tier 1 GraphRAG는 별도 biweekly Docker job 으로 측정 (CI minute $1-2/month)
on:
  schedule:
    - cron: '0 9 * * 1/14'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark-tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq python3 docker.io
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Start GraphRAG Docker (placeholder — replace with real image when published)
        run: |
          # TODO v1.1: docker pull ghcr.io/treylom/claude-discode-graphrag:latest
          # docker run -d -p 8400:8400 -v ./sample-vault:/vault --name graphrag ghcr.io/treylom/claude-discode-graphrag:latest
          echo "Tier 1 Docker image pending v1.1 — emitting placeholder result"
          mkdir -p benchmark/results
          jq -n '{ "skipped": true, "reason": "Tier 1 Docker image pending v1.1 release" }' > benchmark/results/tier1-placeholder.json

      - name: Run Tier 1 (env GRAPHRAG_URL pointing to docker)
        env:
          GRAPHRAG_URL: http://localhost:8400
        run: |
          if curl -fsS http://localhost:8400/health >/dev/null 2>&1; then
            bash benchmark/runners/tier1.sh --output benchmark/results/tier1-$(date +%Y-%m-%d).json
          else
            echo "GraphRAG server not running — skipping Tier 1 measurement"
          fi

      - name: Open PR (if Tier 1 measured)
        if: hashFiles('benchmark/results/tier1-*.json') != ''
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(benchmark): Tier 1 GraphRAG biweekly update"
          title: "Tier 1 GraphRAG biweekly auto-update"
          body: |
            Auto-generated by `.github/workflows/benchmark-tier1.yml` (biweekly Docker job).

            **Manual review required** — Tier 1 측정값 변동 폭이 크면 v1.1 graduate trigger.
          branch: benchmark/tier1-update
          delete-branch: true
          labels: benchmark, tier1, manual-review-required
