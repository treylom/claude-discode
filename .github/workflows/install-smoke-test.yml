name: install smoke test (v2.3)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
        # v2.3.3 Cat A3: Python 3.10/3.11/3.12 matrix 확장 (Phase 2 codex finding)
        python-version: ['3.10', '3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux deps (ripgrep + jq)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update -y && sudo apt-get install -y ripgrep jq

      - name: Install macOS deps (ripgrep + jq)
        if: matrix.os == 'macos-latest'
        run: brew install ripgrep jq

      - name: Verify scripts are executable
        run: chmod +x scripts/install-*.sh scripts/install.sh scripts/healthcheck.sh

      - name: install.sh --check (allows superpowers missing in CI — Claude Code CLI not installed)
        run: |
          set +e
          bash scripts/install.sh --check
          rc=$?
          # CI 안 superpowers / obsidian-cli optional fail OK — required (ripgrep / graphrag) 만 strict
          # rc=1 → required FAIL (block) / rc=0 → all OK
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "install.sh --check unexpected exit code: $rc"; exit 1
          fi
          # rc=1 시 sub-installer log 확인 — superpowers/obsidian-cli optional 만 fail OK
          echo "install.sh --check exit code: $rc (CI permits required fail on superpowers/obsidian-cli pre-install)"

      - name: install-ripgrep.sh --apply
        run: bash scripts/install-ripgrep.sh --apply

      - name: install-graphrag.sh --apply
        run: bash scripts/install-graphrag.sh --apply

      - name: Show venv pip list (debug visibility)
        run: |
          source ~/.cache/thiscode/graphrag/venv/bin/activate
          which python
          which pip
          python -m pip list 2>&1 || true

      - name: Verify GraphRAG deps import
        run: |
          source ~/.cache/thiscode/graphrag/venv/bin/activate
          python -c "import networkx, community, fastapi, uvicorn, numpy, httpx; print('GraphRAG deps OK')"

      - name: healthcheck.sh (exit 0 = all OK, exit 2 = NOT YET OK, exit 1 = required FAIL block)
        run: |
          set +e
          bash scripts/healthcheck.sh
          rc=$?
          if [ "$rc" -eq 0 ] || [ "$rc" -eq 2 ]; then
            echo "healthcheck OK (exit $rc)"
          else
            echo "healthcheck FAIL — exit $rc"; exit 1
          fi

      - name: install-dense-embedding.sh --check (CI 안 not installed — exit 1 expected)
        run: |
          set +e
          bash scripts/install-dense-embedding.sh --check
          rc=$?
          # Dense optional — exit 1 (missing) 도 CI 안 OK
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "install-dense-embedding.sh --check unexpected exit code: $rc"; exit 1
          fi

      - name: Show ATTRIBUTIONS.md (16 deps matrix)
        run: head -n 100 ATTRIBUTIONS.md

      - name: Dump graphrag.log on failure (v2.3.1 debug visibility)
        if: failure()
        run: |
          echo "=== graphrag.log ==="
          cat ~/.cache/thiscode/graphrag/run/graphrag.log 2>&1 || echo "(no graphrag.log)"
          echo ""
          echo "=== setup log (last 50 lines) ==="
          tail -n 50 ~/.thiscode-setup.log 2>&1 || echo "(no setup log)"
          echo ""
          echo "=== uvicorn process check ==="
          ps aux | grep -i uvicorn || echo "(no uvicorn process)"
          echo ""
          echo "=== port 8400 check ==="
          (nc -z localhost 8400 && echo "port 8400 listening") || echo "port 8400 not listening"
