name: benchmark
on:
  push:
    branches: [main]
    paths-ignore:
      - 'benchmark/results/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      BENCHMARK_SKIP_TIER1: '1'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'  # Codex CC-B — June 2 2026 deadline 전 검증
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq python3
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run benchmark (Tier 2/3/4 — Tier 1 skipped in CI)
        run: bash benchmark/runners/run-all.sh

      - name: Generate report + inject README
        run: python3 benchmark/report-generator.py

      - name: Upload results as artifact
        # v1.0.2 generic policy — sample fixture 측정 결과 PR 생성 안 함 (README inject 도 안 함).
        # PR 자동 생성은 본인 vault fixture 사용 시 사용자가 직접 처리 (docs/BENCHMARK.md 참고).
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark/results/
          retention-days: 30
