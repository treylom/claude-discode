name: benchmark
on:
  push:
    branches: [main]
    paths-ignore:
      - 'benchmark/results/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      BENCHMARK_SKIP_TIER1: '1'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'  # Codex CC-B — June 2 2026 deadline 전 검증
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq python3
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run benchmark (Tier 2/3/4 — Tier 1 skipped in CI)
        run: bash benchmark/runners/run-all.sh

      - name: Generate report + inject README
        run: python3 benchmark/report-generator.py

      - name: Open PR with results
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(benchmark): auto-update"
          title: "Benchmark auto-update"
          body: |
            Auto-generated by `.github/workflows/benchmark.yml`.

            ## Tier 결과
            - Tier 1 (GraphRAG): SKIPPED in CI (env BENCHMARK_SKIP_TIER1=1 — biweekly Docker job)
            - Tier 2 (CLI): SKIPPED (obsidian-cli not installed in runner)
            - Tier 3 (MCP): SKIPPED (vault-search MCP requires Claude Code runtime)
            - Tier 4 (ripgrep): measured

            ## ⚠ Manual review required (Round 2/3 outcome)
            - 표 diff 직접 확인 후 머지
            - **auto-merge 금지** — 카파시 또는 PR reviewer 가 수동 머지

            For Tier 1 full numbers, see biweekly Docker GraphRAG job results.
          branch: benchmark/auto-update
          delete-branch: true
          labels: benchmark, auto-update, manual-review-required
