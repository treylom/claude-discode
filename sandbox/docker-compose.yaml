services:
  sandbox:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    image: thiscode-sandbox
    container_name: thiscode-sandbox
    working_dir: /thiscode
    volumes:
      - ..:/thiscode
      - sandbox-home:/root
    environment:
      CLAUDE_DISCODE_HOME: /thiscode
      CLAUDE_DISCODE_VAULT: /thiscode/sample-vault
      CLAUDE_DISCODE_HEADLESS: "1"
    stdin_open: true
    tty: true

volumes:
  sandbox-home: {}
