name: claude-discode-search
description: 4-Tier vault search (GraphRAG FastAPI → Obsidian CLI → vault-search MCP → ripgrep) with automatic fallback per contracts/search-fallback-4tier.md v0.1.0.
version: 1.0.0
license: MIT
homepage: https://github.com/treylom/claude-discode

provides_tools:
  - claude_discode_search
provides_commands:
  - /claude-discode:search

tier: external
model: opus[1m]
allowedTools:
  - Bash
  - Read
  - Glob
  - Grep
  - mcp__vault-search__*

gates:
  - id: latency-p95
    expr: "latency_ms_p95 < 2000"
    evaluator: simple
  - id: recall-minimum
    expr: "recall_at_5 > 0.5"
    evaluator: simple

benchmark:
  fixtures: benchmark/fixtures/queries.yaml
  axes:
    - latency_ms
    - recall_at_k
    - cost_tokens
    - setup_time_min
    - kg_depth
  baseline_tier: 4
