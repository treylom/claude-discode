name: search
description: 4-Tier vault search dispatcher — Tier 1 GraphRAG (FastAPI semantic + graph) → Tier 2 vault-search MCP (embedding) → Tier 3 Obsidian CLI (index) → Tier 4 ripgrep (literal). 정확도 우선 fallback. v2.0 정정 — 사용자 spec.
version: 1.0.0
license: MIT
homepage: https://github.com/treylom/ThisCode

provides_tools:
  - search
provides_commands:
  - /thiscode:search

tier: external
model: opus[1m]
allowedTools:
  - Bash
  - Read
  - Glob
  - Grep
  - mcp__vault-search__*

gates:
  - id: latency-p95
    expr: "latency_ms_p95 < 2000"
    evaluator: simple
  - id: recall-minimum
    expr: "recall_at_5 > 0.5"
    evaluator: simple

benchmark:
  fixtures: benchmark/fixtures/queries.yaml
  axes:
    - latency_ms
    - recall_at_k
    - cost_tokens
    - setup_time_min
    - kg_depth
  baseline_tier: 4
