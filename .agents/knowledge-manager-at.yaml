name: knowledge-manager-at
description: Knowledge Manager Agent Teams variant — Mode R (Reorganization) workflow with category lead + worker split via tofu-at pattern. Advanced KM for team vaults.
version: 1.0.0
license: MIT
homepage: https://github.com/treylom/ThisCode
provides_tools:
  - knowledge_manager_at
provides_commands:
  - /thiscode:km
tier: experimental
model: opus[1m]
allowedTools:
  - Bash
  - Read
  - Write
  - Glob
  - Grep
  - mcp__vault-search__*
phases:
  preflight:
    auto: true
    scope: read-only
    checks:
      - broken_wikilinks
      - folder_entropy
      - orphan_notes
    output: meetings/{date}-km-at-preflight-report.md
  apply:
    auto: false
    dry_run_required: true
